<!doctype html>
<html lang="{{ site.lang | default: 'en' }}">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>{% if page.title %}{{ page.title }} — {{ site.title }}{% else %}{{ site.title }}{% endif %}</title>
  <meta name="description" content="{{ page.description | default: site.description | strip_newlines | truncate: 300 }}">
  <link rel="canonical" href="{{ page.url | absolute_url }}">
  <meta property="og:title" content="{{ page.title | default: site.title }}">
  <meta property="og:description" content="{{ page.description | default: site.description | strip_newlines | truncate: 300 }}">
  <meta property="og:type" content="{% if page.video_id %}video.other{% else %}website{% endif %}">
  <meta property="og:url" content="{{ page.url | absolute_url }}">
  <meta property="og:image" content="{{ '/assets/avatar.png' | absolute_url }}">
  <style>
    :root { --ink:#f4eee4; --muted:#bcb5b0; --line:#4a4144; --accent:#b19ed3;
      --coral:#d6848f; --amber:#d9aa69; --bg:#151315; --panel:#211d20; }
    * { box-sizing: border-box; }
    body { margin:0; color:var(--ink); background:var(--bg);
      background-image:radial-gradient(circle at 50% -20%,#353047 0,transparent 42%);
      font:17px/1.65 Georgia,"Times New Roman",serif;
      -webkit-text-size-adjust:100%; }
    .wrap { max-width:860px; margin:0 auto; padding:1.4rem 1.2rem 4rem; }
    header a { color:var(--ink); font-weight:700; text-decoration:none; letter-spacing:.03em;
      display:flex; align-items:center; gap:.7rem; }
    header img { width:38px; height:38px; border-radius:50%; }
    header { border-bottom:1px solid var(--line); padding-bottom:.9rem; margin-bottom:2.2rem; }
    h1 { font-size:clamp(2rem,6vw,3.7rem); line-height:1.08; margin:.3rem 0 1.2rem; }
    h2 { font-size:1.35rem; margin:2.2rem 0 .65rem; }
    h3 { font-size:1.05rem; margin:1.4rem 0 .4rem; }
    a { color:var(--accent); }
    .primary-link { display:inline-block; background:var(--accent); color:#171419;
      padding:.72rem 1rem; border-radius:999px; font-weight:700; text-decoration:none; }
    .watch { display:inline-block; margin:.2rem 0 1.2rem; font-weight:600; }
    .quick-answer { border:1px solid var(--line); border-left:4px solid var(--accent);
      background:var(--panel); border-radius:8px; padding:.9rem 1.1rem; margin:1.3rem 0; }
    .quick-answer h2 { margin-top:.2rem; font-size:1.05rem; text-transform:uppercase;
      letter-spacing:.06em; color:var(--accent); }
    .faq h3 { color:var(--ink); }
    .meta,.eyebrow { color:var(--muted); font-size:.86rem; letter-spacing:.05em;
      text-transform:uppercase; }
    .episode-card { border-top:1px solid var(--line); padding:1.1rem 0 .4rem; }
    .episode-card h2 { margin:.1rem 0 .45rem; }
    .status { color:var(--amber); }
    footer { border-top:1px solid var(--line); margin-top:3rem; padding-top:1rem;
      color:var(--muted); font-size:.85rem; }
    img { max-width:100%; height:auto; }
    code { background:#2b252d; padding:.1em .35em; border-radius:4px; font-size:.92em; }
    blockquote { margin:1.2rem 0; padding:.2rem 1rem; border-left:3px solid var(--coral);
      color:var(--muted); }
    @media (max-width:540px) { body{font-size:16px} .wrap{padding-inline:1rem} }
  </style>
</head>
<body>
  <div class="wrap">
    <header><a href="{{ '/' | relative_url }}"><img src="{{ '/assets/avatar.png' | relative_url }}" alt="">{{ site.title }}</a></header>
    <main>{{ content }}</main>
    <footer>
      <p>By {{ site.author }}. CEFR-aligned English learning material. Level labels
      are estimates for learners, not official certification. Transcripts,
      examples and dialogue are original unless a source is listed.</p>
    </footer>
  </div>
</body>
</html>
