title: Dear English Radio
description: >-
  CEFR-aligned English listening lessons through clear conversations and
  stories, with reviewed transcripts, useful words, questions, and sources.
author: Wenchang Yue
lang: en
url: "https://wenchangyue.github.io"
baseurl: "/dear-english-radio"
youtube_channel: "https://www.youtube.com/@dearenglishradio"
repository_url: "https://github.com/wenchangyue/dear-english-radio"

collections:
  episodes:
    output: true
    permalink: /episodes/:name/

defaults:
  - scope:
      path: ""
      type: episodes
    values:
      layout: episode

plugins:
  - jekyll-sitemap

exclude:
  - README.md
  - TEMPLATE-episode.md
